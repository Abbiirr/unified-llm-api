router_settings:
  routing_strategy: latency-based-routing
  num_retries: 6
  retry_after: 1
  allowed_fails: 1
  cooldown_time: 15
  timeout: 35
  stream_timeout: 90
  cache_responses: true
  enable_pre_call_checks: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  json_logs: true

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 18000
