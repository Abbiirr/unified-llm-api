router_settings:
  routing_strategy: latency-based-routing
  num_retries: 1
  retry_after: 2
  allowed_fails: 1
  cooldown_time: 60
  timeout: 45
  stream_timeout: 120
  cache_responses: true
  enable_pre_call_checks: true
  retry_policy:
    BadRequestErrorRetries: 0
    ContentPolicyViolationRetries: 0
    AuthenticationErrorRetries: 0
    TimeoutErrorRetries: 0
    RateLimitErrorRetries: 0
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  json_logs: true
litellm_settings:
  drop_params: true
  set_verbose: false
  fallbacks:
  - llama_local:
    - local
    - tools_local
  - default:
    - default_cloud
    - tools_local
  - spec-rag:
    - default_cloud
  - tools:
    - tools_local
  - tools_stable:
    - tools_local
  - tools_cloud:
    - default_cloud
  - tools_large:
    - tools_local
    - default_cloud
  - bench:
    - tools_local
  - bench_stable:
    - default
  - bench_large:
    - bench_cloud
  - bench_cloud:
    - default_cloud
  - swebench:
    - tools_local
  - thinking:
    - thinking_cloud
  - thinking_cloud:
    - default_cloud
  - coding:
    - coding_cloud
  - coding_cloud:
    - default_cloud
  - vision:
    - default_cloud
  - fast:
    - default_cloud
  - big:
    - tools_local
    - default_cloud
  - tools_stable_cloud:
    - default_cloud
  - bench_stable_cloud:
    - default_cloud
  - swebench_cloud:
    - default_cloud
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 18000
  context_window_fallbacks:
  - tools:
    - tools_large
  - tools_stable:
    - tools_large
  - bench:
    - bench_large
  - bench_stable:
    - bench_large
  - swebench:
    - tools_large
