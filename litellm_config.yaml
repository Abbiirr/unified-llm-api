router_settings:
  routing_strategy: latency-based-routing
  num_retries: 10
  retry_after: 2
  allowed_fails: 1
  cooldown_time: 300
  timeout: 600
  stream_timeout: 900
  cache_responses: true
  enable_pre_call_checks: false
  retry_policy:
    BadRequestErrorRetries: 3
    ContentPolicyViolationRetries: 0
    AuthenticationErrorRetries: 0
    TimeoutErrorRetries: 3
    RateLimitErrorRetries: 5
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  json_logs: true
litellm_settings:
  drop_params: true
  set_verbose: false
  fallbacks:
  - tools:
    - tools_stable
  - tools_large:
    - tools_stable
  - bench:
    - bench_stable
  - bench_large:
    - bench_stable
  - tools_stable:
    - default
  - bench_stable:
    - default
  - thinking:
    - default
  - coding:
    - default
  - vision:
    - default
  - fast:
    - default
  - big:
    - default
  - swebench:
    - default
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 18000
  context_window_fallbacks:
  - tools:
    - tools_large
  - tools_stable:
    - tools_large
  - bench:
    - bench_large
  - bench_stable:
    - bench_large
  - swebench:
    - tools_large
