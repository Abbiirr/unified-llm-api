router_settings:
  routing_strategy: latency-based-routing
  num_retries: 2
  retry_after: 0
  allowed_fails: 2
  cooldown_time: 60
  timeout: 12
  stream_timeout: 90
  cache_responses: false
  enable_pre_call_checks: true
  retry_policy:
    BadRequestErrorRetries: 0
    ContentPolicyViolationRetries: 0
    AuthenticationErrorRetries: 0
    TimeoutErrorRetries: 0
    RateLimitErrorRetries: 2
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  json_logs: true
  health_check_interval: 86400
litellm_settings:
  drop_params: true
  set_verbose: false
  fallbacks:
  - llama_local:
    - local
  - default:
    - default_cloud
  - spec-rag:
    - default_cloud
  - tools_cloud:
    - default_cloud
  - tools_large:
    - default_cloud
  - bench_stable:
    - default
  - bench_large:
    - bench_cloud
  - bench_cloud:
    - default_cloud
  - thinking:
    - thinking_cloud
  - thinking_cloud:
    - default_cloud
  - coding_cloud:
    - default_cloud
  - ocr:
    - ocr_pool
    - tools_local
  - ocr_pool:
    - tools_local
  - glm-ocr:
    - ocr_pool
    - tools_local
  - coding:
    - coding_pool
  - coding_pool:
    - tools_local
  - vision:
    - ocr
  - fast:
    - default_cloud
  - big:
    - default_cloud
  - tools_stable_cloud:
    - default_cloud
  - bench_stable_cloud:
    - default_cloud
  - swebench_cloud:
    - default_cloud
  - qwen3.5-0.8b:
    - fast
    - default
  - local:
    - default_cloud
  cache: false
  context_window_fallbacks:
  - tools:
    - tools_large
  - tools_stable:
    - tools_large
  - bench:
    - bench_large
  - bench_stable:
    - bench_large
  - swebench:
    - tools_large
