# =============================================================================
# spec-rag: stable alias for SpecRAG V1 (LightRAG indexing + diagram plans +
# inconsistency/merge analysis + chat). Llama 3.3-70B instruct only —
# reasoning NEVER leaks into message.content. ≥32k context everywhere.
# Diverse providers to sustain ~22 req/min over 1300-call indexing runs.
# Reasoning-capable models (gpt-oss, qwen3-235b, nemotron-ultra) are
# intentionally excluded — they drop answer into `reasoning` field.
# =============================================================================
- model_name: spec-rag
